<!DOCTYPE html>
<html>
    <head>
        <title>Welcome to International Trips </title>
        <style>
        .body{
            width:100%;
            height:100vh;
            background-image:linear-gradient(rgba(8, 10, 0, 0.8), rgb(0,0,0,0.2)), url("beach.avif");
        
            background-size:cover;
                }
        nav{
            width:100%;
            height: 100px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white
        }
        .logo{
            font-size: 30px;
            letter-spacing: 2px;

        }
        .menu a{
            position: relative;      /* Add this */
            display: inline-block; 
            text-decoration:none;
            color:white;
            padding: 10px 20px;
            font-size: 20px;
        }
        .menu a:before{
            content: '';
            position:absolute;
            top:0;
            left:0;
            width:0%;
            height:100%;
            border-bottom:2px solid indianred;
            transition:0.4s linear;
        }
        .menu a:hover:before{
            width:90%;
        }
        
        .register a{
            text-decoration:none;
            color:white;
            padding: 10px 20px;
            margin-right: 30px;
            font-size: 20px;
            background-color:indianred;
            border-radius: 5px;
            transition:0.4s;
        }
        .register a:hover{
            background:transparent;
            border:1px solid indianred;
        }
        .h-txt{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            text-align:center;
            color:white;
        }
        .h-txt span{
            Letter-spacing: 5px;
        }
        .h-txt h1{
            font-size: 35px;
        }
        .h-txt a{
            text-decoration:none;
            color:white;
            padding: 10px 20px;
            font-size: 20px;
            background-color:indianred;
            border-radius: 5px;
            letter-spacing: 5px;
            transition:0.4s;
        }
        .h-txt a:hover{
            background:transparent;
            border:1px solid indianred;
        }
            </style>
        </head>
        <body class="body">
        <nav>
            <div class="logo">
                Explorer
            </div>
            <div class="menu">
                <a href="#">Home</a>
                <a href="#">Hill Stations</a>
                <a href="#">Best Offers</a>
                <a href="#">Our Sites</a>
                <a href="#">Contact</a>
            </div>
            <div class="register">
                <a href="#">Register</a>
            </div>
        </nav>
        <section class ="h-txt">
            <h1>Welcome to International Trips</h1>
            <p>Explore the world with us and make unforgettable memories.</p>
        <br>
        <a href="#">Book Now</a>
        </section>
        </body>
    
        </html>
